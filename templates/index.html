    <script>
    const domainInput=document.getElementById('domainInput'),scanBtn=document.getElementById('scanBtn'),progressEl=document.getElementById('scanProgress'),progressLog=document.getElementById('progressLog'),errorEl=document.getElementById('scanError'),resultsEl=document.getElementById('results');domainInput.addEventListener('keydown',e=>{if(e.key==='Enter')startScan()});const SCAN_STEPS=['Resolving DNS...','Establishing TLS connection...','Analyzing cipher suite...','Inspecting certificate chain...','Probing supported TLS versions...','Checking HTTP security headers...','Evaluating quantum risks...','Generating report...'];async function startScan(){const domain=domainInput.value.trim();if(!domain){domainInput.focus();return}errorEl.classList.remove('active');resultsEl.classList.remove('active');resultsEl.innerHTML='';progressEl.classList.add('active');progressLog.innerHTML='';scanBtn.disabled=true;scanBtn.textContent='Scanning...';let stepIndex=0;const stepInterval=setInterval(()=>{if(stepIndex<SCAN_STEPS.length){const prev=progressLog.querySelector('.active-step');if(prev){prev.classList.remove('active-step');prev.classList.add('done');prev.textContent='✓ '+prev.textContent.replace('→ ','')}const div=document.createElement('div');div.className='active-step';div.textContent='→ '+SCAN_STEPS[stepIndex];progressLog.appendChild(div);stepIndex++}},800);try{const resp=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});clearInterval(stepInterval);const data=await resp.json();if(!resp.ok)throw new Error(data.error||'Scan failed');const prev=progressLog.querySelector('.active-step');if(prev){prev.classList.remove('active-step');prev.classList.add('done');prev.textContent='✓ '+prev.textContent.replace('→ ','')}await new Promise(r=>setTimeout(r,400));progressEl.classList.remove('active');renderResults(data)}catch(err){clearInterval(stepInterval);progressEl.classList.remove('active');errorEl.textContent='✕ '+(err.message||'Connection failed.');errorEl.classList.add('active')}finally{scanBtn.disabled=false;scanBtn.textContent='Scan'}}function scoreColor(s){if(s<=20)return'var(--green)';if(s<=40)return'var(--yellow)';if(s<=65)return'var(--orange)';return'var(--red)'}function riskClass(l){return'risk-'+(l||'MEDIUM').toUpperCase()}function statusLabel(s){return{'SAFE':'Quantum Safe','LOW_RISK':'Low Risk','MEDIUM_RISK':'Medium Risk','VULNERABLE':'Vulnerable','CRITICAL':'Critical','ERROR':'Error'}[s]||s}
    
    function renderResults(d) {
        // Ochrana proti chybějícím datům
        if (!d) {
            resultsEl.innerHTML = '<div class="scan-error active">Chyba: Prázdná odpověď ze serveru</div>';
            resultsEl.classList.add('active');
            return;
        }
        
        // Vytvoření záložních objektů, pokud API posílá stará data
        if (!d.certificate) {
            d.certificate = {
                subject: d.key_type ? `Key: ${d.key_type}` : 'N/A',
                issuer: 'N/A',
                key_type: d.key_type || 'N/A',
                key_size: 0,
                signature_algorithm: 'N/A',
                is_expired: false,
                days_until_expiry: 0,
                not_after: 'N/A'
            };
        }
        
        if (!d.cipher) {
            d.cipher = {
                name: d.cipher || 'N/A',
                key_exchange: 'N/A',
                encryption: 'N/A',
                encryption_bits: 0,
                is_pqc: false
            };
        }
        
        // Doplníme chybějící pole
        d.ip_address = d.ip_address || '0.0.0.0';
        d.port = d.port || 443;
        d.overall_risk_score = d.overall_risk_score || d.risk_score || 0;
        d.overall_pqc_status = d.overall_pqc_status || 'VULNERABLE';
        
        // Výpočet pro kolečko skóre
        const c = 2 * Math.PI * 54;
        const o = c - (d.overall_risk_score / 100) * c;
        const cl = scoreColor(d.overall_risk_score);
        
        // Začátek HTML
        let h = `<div class="results-header"><div class="results-target">${esc(d.hostname)} <span>· ${esc(d.ip_address)}:${d.port}</span></div><div class="status-badge status-${d.overall_pqc_status}">${statusLabel(d.overall_pqc_status)}</div></div><div class="score-section"><div class="score-ring-wrap"><svg width="130" height="130" viewBox="0 0 130 130"><circle class="score-ring-bg" cx="65" cy="65" r="54"/><circle class="score-ring-fill" cx="65" cy="65" r="54" stroke="${cl}" stroke-dasharray="${c}" stroke-dashoffset="${o}"/></svg><div class="score-value"><div class="score-number" style="color:${cl}">${d.overall_risk_score}</div><div class="score-label">Risk Score</div></div></div><div class="score-details"><div class="score-detail-row"><span class="score-detail-key">TLS Version</span><span class="score-detail-val">${esc(d.tls_version)}</span></div><div class="score-detail-row"><span class="score-detail-key">Cipher Suite</span><span class="score-detail-val">${esc(d.cipher.name)}</span></div><div class="score-detail-row"><span class="score-detail-key">Key Exchange</span><span class="score-detail-val">${esc(d.cipher.key_exchange)}</span></div><div class="score-detail-row"><span class="score-detail-key">Encryption</span><span class="score-detail-val">${esc(d.cipher.encryption)} (${d.cipher.encryption_bits}-bit)</span></div><div class="score-detail-row"><span class="score-detail-key">PQC Key Exchange</span><span class="score-detail-val" style="color:${d.cipher.is_pqc?'var(--green)':'var(--red)'}">${d.cipher.is_pqc?'✓ YES':'✕ NO'}</span></div></div></div>`;
        
        // Certificate sekce
        const ce = d.certificate;
        h += `<div class="cards-grid"><div class="card"><div class="card-label">Certificate Subject</div><div class="card-value">${esc(ce.subject)}</div><div class="card-sub">Issuer: ${esc(ce.issuer)}</div></div><div class="card"><div class="card-label">Key Type</div><div class="card-value">${esc(ce.key_type)} (${ce.key_size}-bit)</div><div class="card-sub">Sig: ${esc(ce.signature_algorithm)}</div></div><div class="card"><div class="card-label">Expiry</div><div class="card-value" style="color:${ce.is_expired?'var(--red)':ce.days_until_expiry<30?'var(--orange)':'var(--text-bright)'}">${ce.is_expired?'EXPIRED':ce.days_until_expiry+' days'}</div><div class="card-sub">${esc(ce.not_after)}</div></div></div>`;
        
        // Quantum Risks
        if (d.quantum_risks && d.quantum_risks.length > 0) {
            h += `<div class="section-title">Quantum Risk Assessment</div><table class="risk-table"><thead><tr><th>Component</th><th>Level</th><th>Threat</th><th>Details</th></tr></thead><tbody>`;
            for (const r of d.quantum_risks) {
                h += `<tr><td style="color:var(--text-bright);font-weight:500">${esc(r.component)}</td><td><span class="risk-level ${riskClass(r.level)}">${esc(r.level)}</span></td><td>${esc(r.threat)}</td><td><div>${esc(r.detail)}</div><div class="risk-detail">→ ${esc(r.recommendation)}</div></td></tr>`;
            }
            h += '</tbody></table>';
        }
        
        // Supported Protocols
        if (d.supported_protocols && d.supported_protocols.length > 0) {
            h += `<div class="section-title">Supported TLS Versions</div><div class="proto-grid">`;
            for (const p of d.supported_protocols) {
                const cs = p.supported ? (p.status === 'CRITICAL' ? 'proto-critical' : 'proto-enabled') : 'proto-disabled';
                const lb = p.supported ? (p.status === 'CRITICAL' ? '⚠ ENABLED' : '✓ Enabled') : '— Disabled';
                h += `<div class="proto-item"><div class="proto-name">${esc(p.protocol)}</div><div class="proto-status ${cs}">${lb}</div></div>`;
            }
            h += '</div>';
        }
        
        // HTTP Headers
        if (d.http_headers) {
            const hd = d.http_headers;
            const hc = hd.score >= 80 ? 'var(--green)' : hd.score >= 50 ? 'var(--orange)' : 'var(--red)';
            h += `<div class="section-title">HTTP Security Headers</div><div class="headers-bar"><div><div class="headers-score" style="color:${hc}">${hd.score}/100</div><div class="headers-label">Header Score</div></div>`;
            if (hd.missing_headers && hd.missing_headers.length > 0) {
                h += `<div class="headers-missing">Missing: ${hd.missing_headers.map(esc).join(', ')}</div>`;
            }
            h += '</div>';
        }
        
        // Recommendations
        if (d.recommendations && d.recommendations.length > 0) {
            h += `<div class="section-title">Recommendations</div><ul class="recs-list">`;
            d.recommendations.forEach((r, i) => {
                h += `<li><span class="rec-num">${i + 1}.</span> ${esc(r)}</li>`;
            });
            h += '</ul>';
        }
        
        // Chain Issues
        if (d.chain_issues && d.chain_issues.length > 0) {
            h += `<div class="section-title">⚠ Warnings</div><ul class="recs-list">`;
            d.chain_issues.forEach(i => {
                h += `<li><span class="rec-num" style="color:var(--orange)">!</span> ${esc(i)}</li>`;
            });
            h += '</ul>';
        }
        
        // Errors
        if (d.errors && d.errors.length > 0) {
            h += `<div class="section-title" style="color:var(--red)">Errors</div><ul class="recs-list">`;
            d.errors.forEach(e => {
                h += `<li><span class="rec-num" style="color:var(--red)">✕</span> ${esc(e)}</li>`;
            });
            h += '</ul>';
        }
        
        resultsEl.innerHTML = h;
        resultsEl.classList.add('active');
        resultsEl.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
    
    function esc(s) {
        if (s === null || s === undefined) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }
    </script>
